# ============================================================================
# IsoGraph SDPO Configuration
# ============================================================================
# Integration: Members A + B + C
#
# This config extends ppo_trainer with IsoGraph-specific settings:
#   - actor.policy_loss.loss_mode: isograph (activates compute_policy_loss_isograph)
#   - actor.policy_loss.isograph.*: IsoGraphSDPOConfig hyperparameters
#   - actor.self_distillation.*: DGR feedback injection templates
#   - isograph.use_dummy_env: true (DummyEnvironment) or false (Member C's VE-MDP)
#   - isograph.oracle_graph_path: path to single oracle graph JSON
#   - isograph.oracle_graph_dir: path to Member B's data-B directory (page_*.json files)
#
# Usage:
#   # Member C's real VE-MDP environment:
#   python -m verl.trainer.train_isograph_sdpo \
#     --config-name=isograph_sdpo \
#     isograph.use_dummy_env=false \
#     isograph.oracle_graph_dir=/path/to/data-B \
#     isograph.svm_backend=dummy \
#     ...
#
#   # Dummy environment (no Member C needed):
#   python -m verl.trainer.train_isograph_sdpo \
#     --config-name=isograph_sdpo \
#     isograph.use_dummy_env=true \
#     isograph.oracle_graph_path=/path/to/oracle.json \
#     ...
#
# Hydra overrides: model, data, training hyperparameters
# ============================================================================

defaults:

  # Inherit all defaults from ppo_trainer
  - ppo_trainer

  # Override actor config with our SDPO-specific settings
  - _self_


# ============================================================================
# Model context length
# ============================================================================

max_model_len: 8192


# ============================================================================
# Actor / Rollout / Ref configuration
# ============================================================================

actor_rollout_ref:

  actor:

    # --------------------------------------------------------------------------
    # FSDP / memory offload configuration
    # --------------------------------------------------------------------------
    fsdp_config:

      # Offload model parameters to CPU when not needed
      param_offload: true

      # Offload optimizer states to CPU
      optimizer_offload: true

    # --------------------------------------------------------------------------
    # Batch size configuration
    # --------------------------------------------------------------------------
    use_dynamic_bsz: true

    # --------------------------------------------------------------------------
    # KL penalty configuration (OPTIONAL for IsoGraph SDPO on single-GPU machines)
    # --------------------------------------------------------------------------
    # Set use_kl_loss=false on single-GPU / low-VRAM machines to skip loading
    # the reference model (saves ~16 GB GPU memory). The IsoGraph SDPO advantage
    # A_t = log π_teacher - log π_student is still computed without the ref.
    # The KL penalty term -β·KL(π_θ||π_ref) is gracefully skipped.
    use_kl_loss: false

    # Maximum tokens per GPU per micro batch
    ppo_max_token_len_per_gpu: 4096

    # --------------------------------------------------------------------------
    # Policy loss configuration (activates IsoGraph SDPO)
    # --------------------------------------------------------------------------
    policy_loss:

      # Loss mode: isograph | sdpo | vanilla | grpo | ...
      loss_mode: isograph

      isograph:

        # PPO clipping parameter ε
        clip_ratio: 0.2

        # KL penalty coefficient β (regularizes against reference model)
        beta: 0.01

        # EMA decay rate for Self-Teacher model
        ema_decay: 0.99

        # Whether to normalize token-level advantages
        normalize_advantage: true

        # Loss aggregation mode: token-mean | seq-mean-token-sum | seq-mean-token-mean
        loss_agg_mode: token-mean

        # FGW verification thresholds
        tau_node: 0.8   # Node alignment: below this → "entity hallucination"
        tau_edge: 0.7   # Edge topology: below this → "spatial misreasoning"
        tau_order: 0.6 # Reading order: below this → "sequential logic error"

        # FGW balance parameter α
        # α = 0.5: equal weight to semantic cost and topological cost
        fgw_alpha: 0.5

    # --------------------------------------------------------------------------
    # Self-Distillation / Reprompt configuration
    # --------------------------------------------------------------------------
    self_distillation:

      max_reprompt_len: 4096
      is_clip: 2.0
      dont_reprompt_on_self_success: true
      remove_thinking_from_demonstration: true
      include_environment_feedback: true
      environment_feedback_only_without_solution: true

      # Prompt templates
      reprompt_template: |-
        {prompt}

        {solution}

        {feedback}

        Carefully re-analyze the document and provide your answer.

      solution_template: |-
        Correct solution:
        {successful_previous_attempt}

      feedback_template: |-
        [DGR Diagnostic Report]:
        {feedback_raw}

    # --------------------------------------------------------------------------
    # Optimizer / learning rate
    # --------------------------------------------------------------------------
    optim:
      lr: 1e-6
      weight_decay: 0.01
      lr_warmup_steps: 10
      lr_warmup_steps_ratio: 0.0
      total_training_steps: -1

  # --------------------------------------------------------------------------
  # Rollout configuration
  # --------------------------------------------------------------------------
  rollout:

    use_isograph_rollout: true
    n: 4
    calculate_log_probs: true
    response_length: 512

  # --------------------------------------------------------------------------
  # Reference model configuration
  # --------------------------------------------------------------------------
  ref:
    fsdp_config:
      param_offload: true
      optimizer_offload: false


# ============================================================================
# Algorithm configuration
# ============================================================================

algorithm:

  adv_estimator: grpo
  norm_adv_by_std_in_grpo: false
  use_kl_in_reward: false
  gamma: 1.0
  lam: 1.0


# ============================================================================
# Data configuration
# ============================================================================

data:

  # Training and validation parquet files
  # Each parquet row should contain: prompt (JSON string), reward_model (float), image_id (str, optional)
  train_files: null
  val_files: null

  train_batch_size: 1
  max_prompt_length: 1024
  max_response_length: 512
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  dataloader_num_workers: 0
  trust_remote_code: false


# ============================================================================
# Trainer configuration
# ============================================================================

trainer:

  total_epochs: 3
  val_before_train: true
  logger: console
  n_gpus_per_node: 1
  nnodes: 1
  save_freq: 10
  test_freq: 5
  project_name: isograph_sdpo
  experiment_name: qwen2_5_vl_7b_isograph
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  resume_mode: disable
  balance_batch: false
  critic_warmup: 0
  use_legacy_worker_impl: enable


# ============================================================================
# Critic configuration (disabled for SDPO)
# ============================================================================

critic:

  strategy: fsdp2
  ppo_mini_batch_size: 256


# ============================================================================
# Reward model configuration
# ============================================================================

reward_model:

  enable: false


# ============================================================================
# IsoGraph-specific configuration
# ============================================================================
# Controls which VE-MDP environment to use and where to find data.

isograph:

  # --------------------------------------------------------------------------
  # Environment selection
  # --------------------------------------------------------------------------
  # use_dummy_env=true  → DummyEnvironment (pure Python, no Member C needed)
  # use_dummy_env=false → Member C's IsoGraphEnvironment (requires ISOGraph-C package)
  use_dummy_env: true

  # --------------------------------------------------------------------------
  # Oracle graph paths
  # --------------------------------------------------------------------------
  # Path to a single oracle graph JSON file.
  # Used when use_dummy_env=true (always) or as fallback when oracle_graph_dir is not set.
  # Format: {image_id, adversarial_scenario, metadata: {width, height}, oracle_graph: {nodes, edges}}
  oracle_graph_path: null

  # Path to Member B's data directory containing page_*.json files.
  # When set, the trainer indexes all JSON files and performs per-sample
  # oracle graph lookup by image_id during DGR feedback generation.
  # Each JSON file must follow the ImageDataSchema format.
  oracle_graph_dir: null

  # --------------------------------------------------------------------------
  # Member C: Image path (for real VE-MDP zoom action)
  # --------------------------------------------------------------------------
  # Path to source image file (e.g., data-B/page_000.png).
  # Required when use_dummy_env=false and you want real image cropping.
  # When null, IsoGraphEnvironment falls back to textual description.
  image_path: null

  # --------------------------------------------------------------------------
  # Member C: SVM backend
  # --------------------------------------------------------------------------
  # "dummy": Use oracle-based simulation (DummySVM).
  #          Returns nodes from the oracle graph that overlap the zoomed patch.
  # "onnx":  Use real ONNX layout model. Requires svm_model_path to be set.
  svm_backend: dummy

  # Path to ONNX SVM model file. Required when svm_backend=onnx.
  svm_model_path: null


# ============================================================================
# Profiler configuration
# ============================================================================

global_profiler:

  tool: null
  steps: null
